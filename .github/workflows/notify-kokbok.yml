name: Meddela kokbok om uppdatering

on:
  push:
    branches: [main]
    paths:
      - '**.cook'
      - '**.jpg'
      - '**.jpeg'

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Trigga bygge i kokbok
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.KOKBOK_DISPATCH_TOKEN }}
          repository: jonatanskogsfors/kokbok
          event-type: recipes-updated
